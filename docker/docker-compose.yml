services:
  postgres:
    image: postgres:15-alpine
    container_name: algo-postgres
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-algo_trading}
      POSTGRES_USER: ${POSTGRES_USER:-algo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algo123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algo} -d ${POSTGRES_DB:-algo_trading}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: algo-redis
    env_file:
      - ../.env
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Core Services
  market-data-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
    container_name: algo-market-data
    user: "0:0"
    command: node src/marketData/marketDataService.js
    env_file:
      - ../.env
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=127.0.0.1
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-algo_trading}
      - POSTGRES_USER=${POSTGRES_USER:-algo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-algo123}
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
    restart: always
    mem_limit: 512m
    cpus: 1
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  strategy-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
    container_name: algo-strategy-engine
    user: "0:0"
    command: node src/strategyEngine/workerManager.js
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      market-data-service:
        condition: service_started
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-algo_trading}
      - POSTGRES_USER=${POSTGRES_USER:-algo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-algo123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always
    mem_limit: 1g
    cpus: 4
    deploy:
      replicas: 1

  order-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
    container_name: algo-order-manager
    user: "0:0"
    command: node src/execution/orderManager/orderManager.js
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-algo_trading}
      - POSTGRES_USER=${POSTGRES_USER:-algo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-algo123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always
    mem_limit: 512m
    cpus: 1

  risk-engine:
    profiles: ["optional"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
    container_name: algo-risk-engine
    command: node src/execution/riskEngine/riskManager.js
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-algo_trading}
      - POSTGRES_USER=${POSTGRES_USER:-algo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-algo123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    restart: always
    mem_limit: 512m
    cpus: 1

  broker-gateway:
    profiles: ["optional"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.service
    container_name: algo-broker-gateway
    command: node src/execution/brokerGateway/brokerRouter.js
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-algo_trading}
      - POSTGRES_USER=${POSTGRES_USER:-algo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-algo123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PAPER_MODE=${PAPER_MODE:-true}
    restart: always
    mem_limit: 512m
    cpus: 1

  api-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: algo-api
    user: "0:0"
    command: node src/api/server.js
    ports:
      - "3001:3001"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - API_PORT=3001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-algo_trading}
      - POSTGRES_USER=${POSTGRES_USER:-algo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-algo123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dev-only-insecure-secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev-only-32-char-insecure-ky}
    restart: always
    mem_limit: 512m
    cpus: 1

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: algo-dashboard
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      api-server:
        condition: service_started
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    restart: always
    mem_limit: 512m
    cpus: 1

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: algo-trading-network
